[build]
  command = "pip install -r requirements-build.txt && python scripts/build_pwa.py --saida dist"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/perguntar"
  to = "/.netlify/functions/perguntar"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/dados/*"
  [headers.values]
    Cache-Control = "no-cache"
